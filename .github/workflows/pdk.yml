name: Run PDK tests

on:
  - push
  - pull_request

jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          curl -JLO 'https://pm.puppet.com/cgi-bin/pdk_download.cgi?dist=ubuntu&rel=22.04&arch=amd64&ver=3.3.0.0'
          sudo dpkg -i pdk_3.3.0.0-1jammy_amd64.deb

      - name: Install PDK Ruby Dependencies
        run: pdk bundle install

      - name: Validate
        run: pdk validate

      - name: Run Unit Tests
        run: pdk test unit
